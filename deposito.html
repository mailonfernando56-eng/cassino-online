<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito - 7Games.Bet</title>
    <style>
        /* CSS Incorporado para Elegância e Funcionalidade */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .navbar {
            width: 100%;
            background-color: #000;
            padding: 15px 0;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-decoration: none;
        }

        .deposit-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            padding: 20px;
        }

        .deposit-box {
            background-color: #262626;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .back-link {
            display: block;
            text-align: left;
            color: #888;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        h2 {
            margin-top: 0;
            color: #fff;
        }

        p {
            color: #ccc;
            margin-bottom: 30px;
        }

        .deposit-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-amount {
            background-color: #00ff88;
            color: #000;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-amount:hover {
            background-color: #00cc6e;
            transform: translateY(-2px);
        }

        .btn-amount:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">7GAMES.BET</a>
    </header>

    <main class="deposit-container">
        <div class="deposit-box">
            <a href="index.html" class="back-link">← Voltar</a>
            <h2>Depósito</h2>
            <p>Selecione o valor desejado</p>
            
            <div class="deposit-options">
                <button class="btn-amount" onclick="window.location.href='10r.html'">R$ 10,00</button>
                <button class="btn-amount" onclick="window.location.href='25r.html'">R$ 25,00</button>
                <button class="btn-amount" onclick="window.location.href='30r.html'">R$ 30,00</button>
            </div>
        </div>
    </main>

</body>
</html>
