<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Depósito - LuxBet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .deposit-container {
            padding: 80px 20px 100px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .deposit-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .deposit-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .deposit-header h1 i {
            color: var(--primary);
        }
        .deposit-header p {
            color: var(--text-muted);
        }
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .plan-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--border);
            transition: 0.3s;
            cursor: pointer;
        }
        .plan-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,200,83,0.2);
        }
        .plan-value {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }
        .plan-value span {
            font-size: 20px;
        }
        .plan-bonus {
            background: rgba(0,200,83,0.1);
            padding: 8px;
            border-radius: 40px;
            margin: 15px 0;
            font-weight: 600;
        }
        .btn-plan {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-plan:hover {
            transform: scale(1.05);
        }
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .qr-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .qr-content img {
            width: 250px;
            height: 250px;
            margin: 20px 0;
        }
        .close-modal {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 15px;
        }
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            z-index: 100;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Voltar</a>
    
    <div class="deposit-container">
        <div class="deposit-header">
            <h1><i class="fas fa-coins"></i> Recarregar Saldo</h1>
            <p>Escolha o valor e faça o pagamento via PIX</p>
        </div>
        
        <div class="plans-grid">
            <div class="plan-card" data-value="10">
                <i class="fas fa-gem" style="font-size: 40px; color: var(--primary);"></i>
                <div class="plan-value">R$ <span>10</span></div>
                <div class="plan-bonus">🎁 +5 Rodadas Grátis</div>
                <button class="btn-plan" onclick="openQR(10)">DEPOSITAR R$10</button>
            </div>
            
            <div class="plan-card" data-value="25">
                <i class="fas fa-crown" style="font-size: 40px; color: var(--primary);"></i>
                <div class="plan-value">R$ <span>25</span></div>
                <div class="plan-bonus">🎁 +15 Rodadas Grátis + Bônus 20%</div>
                <button class="btn-plan" onclick="openQR(25)">DEPOSITAR R$25</button>
            </div>
            
            <div class="plan-card" data-value="30">
                <i class="fas fa-trophy" style="font-size: 40px; color: var(--primary);"></i>
                <div class="plan-value">R$ <span>30</span></div>
                <div class="plan-bonus">🎁 +30 Rodadas Grátis + Bônus 30%</div>
                <button class="btn-plan" onclick="openQR(30)">DEPOSITAR R$30</button>
            </div>
        </div>
    </div>
    
    <div id="qrModal" class="qr-modal">
        <div class="qr-content">
            <h3><i class="fas fa-qrcode"></i> Pagamento PIX</h3>
            <p>Escaneie o QR Code abaixo para pagar</p>
            <img id="qrImage" src="" alt="QR Code">
            <p style="color: var(--primary); font-weight: 700; margin: 10px 0;">Valor: R$ <span id="qrValue">0</span></p>
            <button class="close-modal" onclick="closeQR()">Fechar</button>
        </div>
    </div>
    
    <script>
        function openQR(value) {
            const modal = document.getElementById('qrModal');
            const qrImage = document.getElementById('qrImage');
            const qrValue = document.getElementById('qrValue');
            
            // Usando os QR Codes fornecidos
            if (value === 10) {
                qrImage.src = 'qr-10.png';
            } else if (value === 25) {
                qrImage.src = 'qr-25.png';
            } else if (value === 30) {
                qrImage.src = 'qr-30.png';
            }
            
            qrValue.textContent = value;
            modal.style.display = 'flex';
            
            // Verificar se está logado
            const isLogged = localStorage.getItem('isLogged');
            if (!isLogged) {
                alert('⚠️ Faça login ou cadastre-se antes de depositar!');
                window.location.href = 'login.html';
            }
        }
        
        function closeQR() {
            document.getElementById('qrModal').style.display = 'none';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('qrModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
