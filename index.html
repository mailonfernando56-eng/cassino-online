<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LuxPlay - Cassino Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">
    <div class="logo">LUXPLAY</div>
    <div class="nav-menu">
        <a href="#">Início</a>
        <a href="#">Slots</a>
        <a href="#">Live</a>
        <a href="#">Promoções</a>
    </div>
    <div class="auth-btns">
        <button class="btn-login" id="loginBtn">Entrar</button>
        <button class="btn-signup" id="signupBtn">Cadastro</button>
    </div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-item"><i class="fas fa-home"></i></div>
        <div class="sidebar-item"><i class="fas fa-dice-d6"></i></div>
        <div class="sidebar-item"><i class="fas fa-crown"></i></div>
        <div class="sidebar-item"><i class="fas fa-user"></i></div>
        <div class="sidebar-item"><i class="fas fa-gift"></i></div>
    </div>

    <div class="main-content">
        <div class="search-bar-mobile">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Buscar jogos, slots, jackpot...">
        </div>

        <div class="feature-banner">
            <div class="feature-text">
                <h4>🔥 Bônus de Boas-Vindas</h4>
                <p>100% até R$500 + rodadas grátis</p>
            </div>
            <div class="feature-btn" id="bonusBtn">Resgatar</div>
        </div>

        <div class="section-header">
            <h2><i class="fas fa-fire"></i> Jogos Populares</h2>
            <div class="view-all">Ver todos <i class="fas fa-chevron-right"></i></div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>

        <div class="section-header" style="margin-top: 20px;">
            <h2><i class="fas fa-star"></i> Novidades da Semana</h2>
            <div class="view-all">Novos</div>
        </div>
        <div class="games-grid" id="newGamesGrid"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="bottom-item active" data-tab="home">
        <i class="fas fa-home"></i>
        <span>Início</span>
    </div>
    <div class="bottom-item" data-tab="slots">
        <i class="fas fa-dice-d6"></i>
        <span>Slots</span>
    </div>
    <div class="bottom-item" data-tab="live">
        <i class="fas fa-crown"></i>
        <span>Live</span>
    </div>
    <div class="bottom-item" data-tab="profile">
        <i class="fas fa-user"></i>
        <span>Perfil</span>
    </div>
</div>

<div id="toastMsg" class="toast-msg"></div>

<script src="script.js"></script>
</body>
</html>
