<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cassino Online - Home</title>
</head>
<body>
    <header>
        <div class="logo">CASSINO-OFFICIAL</div>
        <div class="nav-buttons">
            <a href="login.html" class="btn btn-login">Login</a>
            <a href="cadastro.html" class="btn btn-cadastro">Cadastrar</a>
        </div>
    </header>

    <div class="container">
        <h2>🔥 Jogos em Alta</h2>
        <div class="game-grid">
            <!-- Jogo Tigrinho -->
            <div class="game-card">
                <img src="imagens jogos cassino/tigrinho.jpg" alt="Tigrinho">
                <p>Fortune Tiger</p>
            </div>
            <!-- Jogo Touro -->
            <div class="game-card">
                <img src="imagens jogos cassino/touro.jpg" alt="Touro">
                <p>Fortune Ox</p>
            </div>
            <!-- Roleta -->
            <div class="game-card">
                <img src="imagens jogos cassino/roleta.jpg" alt="Roleta">
                <p>Roleta Brasileira</p>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a href="deposito.html" class="btn btn-cadastro" style="padding: 20px 50px; font-size: 20px;">DEPOSITAR AGORA</a>
        </div>
    </div>
</body>
</html>
