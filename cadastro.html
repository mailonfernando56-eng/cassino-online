<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cadastro - LuxBet | Crie sua Conta e Ganhe Bônus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c10;
            --bg-darker: #05070a;
            --bg-card: rgba(18, 22, 28, 0.95);
            --primary: #00c853;
            --primary-dark: #009624;
            --primary-glow: rgba(0, 200, 83, 0.3);
            --secondary: #ffd700;
            --accent: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #8a93a3;
            --text-muted: #5a6373;
            --border: #2a2f3a;
            --border-light: #1f242c;
            --gradient: linear-gradient(135deg, #00c853 0%, #ffd700 100%);
            --gradient-primary: linear-gradient(135deg, #00c853 0%, #69f0ae 100%);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(0, 200, 83, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 200, 83, 0.08), transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            bottom: -50%;
            right: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.05), transparent 70%);
            animation: rotateReverse 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(0, 200, 83, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }

        /* Auth Container */
        .auth-container {
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        /* Auth Card */
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 48px 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease;
        }

        .auth-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
            transform: translateY(-5px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Auth Header */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            display: inline-block;
        }

        .logo span {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--secondary);
        }

        .auth-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-header h2 i {
            color: var(--primary);
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Bonus Badge */
        .bonus-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(0, 200, 83, 0.15), rgba(255, 215, 0, 0.1));
            border: 1px solid rgba(0, 200, 83, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        .bonus-badge i {
            color: var(--primary);
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-group label i {
            margin-right: 8px;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(10, 12, 16, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .input-group input.error {
            border-color: #f44336;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Password Wrapper */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .strength-bars {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .strength-bar {
            height: 4px;
            flex: 1;
            background: var(--border);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .strength-bar.weak { background: #f44336; }
        .strength-bar.medium { background: #ff9800; }
        .strength-bar.strong { background: #00c853; }
        .strength-bar.very-strong { background: #00e676; }

        .strength-text {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Checkbox Group */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group label {
            margin: 0;
            font-size: 13px;
            cursor: pointer;
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: var(--gradient-primary);
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #000;
            margin-bottom: 24px;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
            gap: 12px;
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Auth Footer */
        .auth-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00c853;
            color: #000;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .logo {
                font-size: 28px;
            }

            .auth-header h2 {
                font-size: 24px;
            }

            .input-group input {
                padding: 12px 16px;
            }
        }

        /* CPF Mask Info */
        .input-hint {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="particles" id="particles"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">LUX<span>BET</span></div>
            <h2><i class="fas fa-user-plus"></i> Criar Conta</h2>
            <p>Comece sua jornada com o melhor bônus</p>
            <div class="bonus-badge">
                <i class="fas fa-gift"></i> Ganhe R$50 de bônus no primeiro depósito
                <i class="fas fa-trophy"></i>
            </div>
        </div>
        
        <form id="cadastroForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Nome completo</label>
                <input type="text" id="nome" required placeholder="Digite seu nome completo" autocomplete="name">
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-phone"></i> Telefone</label>
                <input type="tel" id="telefone" required placeholder="(11) 99999-9999" autocomplete="tel">
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-id-card"></i> CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14">
                <span class="input-hint">Digite apenas números</span>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="senha" required placeholder="Mínimo 6 caracteres">
                    <i class="fas fa-eye-slash toggle-password"></i>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bars">
                        <div class="strength-bar" id="bar1"></div>
                        <div class="strength-bar" id="bar2"></div>
                        <div class="strength-bar" id="bar3"></div>
                        <div class="strength-bar" id="bar4"></div>
                    </div>
                    <span class="strength-text" id="strengthText">Digite uma senha</span>
                </div>
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Confirmar senha</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmarSenha" required placeholder="Digite novamente">
                    <i class="fas fa-eye-slash toggle-password"></i>
                </div>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="termos" required>
                <label for="termos">Concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a></label>
            </div>
            
            <button type="submit" class="btn-submit">CRIAR CONTA GRÁTIS</button>
        </form>
        
        <div class="auth-footer">
            Já tem conta? <a href="login.html">Faça login</a>
        </div>
    </div>
</div>

<script>
    // Criar partículas
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }
    }

    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', function() {
            const input = this.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            } else {
                input.type = 'password';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            }
        });
    });

    // CPF Mask
    const cpfInput = document.getElementById('cpf');
    if (cpfInput) {
        cpfInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length <= 11) {
                if (value.length > 9) {
                    value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                } else if (value.length > 6) {
                    value = value.replace(/(\d{3})(\d{3})(\d{3})/, '$1.$2.$3');
                } else if (value.length > 3) {
                    value = value.replace(/(\d{3})(\d{3})/, '$1.$2');
                }
                e.target.value = value;
            }
        });
    }

    // Phone Mask
    const phoneInput = document.getElementById('telefone');
    if (phoneInput) {
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length >= 11) {
                value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            } else if (value.length >= 6) {
                value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            } else if (value.length > 2) {
                value = value.replace(/(\d{2})(\d+)/, '($1) $2');
            }
            e.target.value = value;
        });
    }

    // Password Strength Meter
    function checkPasswordStrength(password) {
        let strength = 0;
        
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        return Math.min(strength, 4);
    }

    function updateStrengthMeter() {
        const password = document.getElementById('senha').value;
        const strength = checkPasswordStrength(password);
        
        const bars = ['bar1', 'bar2', 'bar3', 'bar4'];
        const texts = ['Muito fraca', 'Fraca', 'Média', 'Forte', 'Muito forte'];
        const colors = ['#f44336', '#ff9800', '#ffc107', '#00c853', '#00e676'];
        
        bars.forEach((bar, index) => {
            const element = document.getElementById(bar);
            if (index < strength) {
                element.style.background = colors[strength - 1];
                element.style.opacity = '1';
            } else {
                element.style.background = '#2a2f3a';
                element.style.opacity = '0.5';
            }
        });
        
        const strengthText = document.getElementById('strengthText');
        if (password.length === 0) {
            strengthText.textContent = 'Digite uma senha';
        } else {
            strengthText.textContent = texts[strength];
            strengthText.style.color = colors[strength];
        }
    }

    const senhaInput = document.getElementById('senha');
    if (senhaInput) {
        senhaInput.addEventListener('input', updateStrengthMeter);
    }

    // Show toast message
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.textContent = msg;
        toast.style.background = isError ? '#f44336' : '#00c853';
        toast.style.color = isError ? '#fff' : '#000';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Form submission
    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const telefone = document.getElementById('telefone').value.trim();
        const cpf = document.getElementById('cpf').value.trim();
        const senha = document.getElementById('senha').value;
        const confirmar = document.getElementById('confirmarSenha').value;
        const termos = document.getElementById('termos').checked;
        
        // Validações
        if (!nome || nome.length < 3) {
            showError('Por favor, digite seu nome completo', 'nome');
            return;
        }
        
        if (!email || !email.includes('@') || !email.includes('.')) {
            showError('Por favor, digite um e-mail válido', 'email');
            return;
        }
        
        if (!telefone || telefone.replace(/\D/g, '').length < 10) {
            showError('Por favor, digite um telefone válido', 'telefone');
            return;
        }
        
        if (!cpf || cpf.replace(/\D/g, '').length !== 11) {
            showError('Por favor, digite um CPF válido', 'cpf');
            return;
        }
        
        if (senha.length < 6) {
            showError('A senha deve ter no mínimo 6 caracteres', 'senha');
            return;
        }
        
        if (senha !== confirmar) {
            showError('As senhas não coincidem', 'confirmarSenha');
            return;
        }
        
        if (!termos) {
            showError('Você precisa aceitar os termos de uso', null);
            return;
        }
        
        // Salvar dados
        const userData = {
            nome: nome,
            email: email,
            telefone: telefone,
            cpf: cpf,
            senha: senha,
            dataCadastro: new Date().toISOString(),
            saldo: 0
        };
        
        localStorage.setItem('userLogged', JSON.stringify(userData));
        localStorage.setItem('isLogged', 'true');
        localStorage.setItem('userName', nome);
        
        showSuccess('✅ Cadastro realizado com sucesso! Redirecionando...');
        
        // Disable button and show loading
        const btn = document.querySelector('.btn-submit');
        btn.innerHTML = '<span class="loading-spinner"></span> Criando conta...';
        btn.disabled = true;
        
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    });
    
    function showError(msg, fieldId) {
        showToast(msg, true);
        
        if (fieldId) {
            const field = document.getElementById(fieldId);
            field.classList.add('error');
            setTimeout(() => {
                field.classList.remove('error');
            }, 500);
        }
    }
    
    function showSuccess(msg) {
        showToast(msg, false);
    }
    
    // Loading spinner style
    const spinnerStyle = document.createElement('style');
    spinnerStyle.textContent = `
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    `;
    document.head.appendChild(spinnerStyle);
    
    // Initialize particles
    document.addEventListener('DOMContentLoaded', () => {
        createParticles();
        
        // Check if already logged in
        const isLogged = localStorage.getItem('isLogged');
        if (isLogged === 'true') {
            showToast('👋 Você já está logado! Redirecionando...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
        
        // Add focus effects
        const inputs = document.querySelectorAll('.input-group input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.style.transform = 'scale(1.01)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.style.transform = '';
            });
        });
    });
</script>

</body>
</html>
