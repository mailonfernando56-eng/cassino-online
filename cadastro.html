<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - 7Games.Bet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">7GAMES.BET</a>
    </header>

    <main class="form-container">
        <form class="form-box" action="/register" method="POST">
            <h2>Cadastre-se Agora</h2>
            
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="name" placeholder="João Silva" required>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" placeholder="********" required>
            </div>

            <button type="submit" class="btn-submit">FINALIZAR CADASTRO</button>
        </form>
    </main>

</body>
</html>
