<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro | 7Games.Bet</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cadastro-box { 
            max-width: 500px; 
            margin: 50px auto; 
            background: var(--bg-card); 
            border-radius: 15px; 
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .banner-cad { width: 100%; height: 180px; object-fit: cover; }
        .form-padding { padding: 30px; }
        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            background: #222; border: 1px solid #444; color: white; border-radius: 8px; 
        }
        .btn-cad { 
            width: 100%; padding: 15px; background: var(--primary); 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="cadastro-box">
        <img src="imagem_2026-03-01_093452021.png" class="banner-cad" alt="Banner Cadastro">
        <div class="form-padding">
            <h3 style="margin-bottom: 20px;">CADASTRE-SE AGORA, É FÁCIL!</h3>
            <input type="text" id="cad-nome" placeholder="Primeiro Nome">
            <input type="text" id="cad-cpf" placeholder="CPF (Verificar)">
            <input type="email" id="cad-email" placeholder="E-mail">
            <input type="password" id="cad-senha" placeholder="Senha">
            <button class="btn-cad" onclick="finalizar()">PRÓXIMO</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function finalizar() {
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            
            if(nome && email && senha) {
                SiteDB.registrar(nome, email, senha);
                alert('Bem-vindo, ' + nome + '!');
                window.location.href = 'index.html';
            } else {
                alert('Preencha todos os campos!');
            }
        }
    </script>
</body>
</html>
