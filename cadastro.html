<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro - LuxBet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <div class="logo">LUX<span>BET</span></div>
                <h2><i class="fas fa-user-plus"></i> Criar Conta</h2>
                <p>Ganhe R$50 de bônus no primeiro depósito</p>
            </div>
            
            <form id="cadastroForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nome completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Telefone</label>
                    <input type="tel" id="telefone" required placeholder="(11) 99999-9999">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-id-card"></i> CPF</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="senha" required placeholder="Mínimo 6 caracteres">
                        <i class="fas fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Confirmar senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmarSenha" required placeholder="Digite novamente">
                        <i class="fas fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                <div class="input-group checkbox-group">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">Concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a></label>
                </div>
                <button type="submit" class="btn-submit">CRIAR CONTA GRÁTIS</button>
            </form>
            
            <div class="auth-footer">
                Já tem conta? <a href="login.html">Faça login</a>
            </div>
        </div>
    </div>
    
    <script>
        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                }
            });
        });

        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmarSenha').value;
            const email = document.getElementById('email').value;
            const nome = document.getElementById('nome').value;
            
            if (!nome || nome.length < 3) {
                showError('Por favor, digite seu nome completo');
                return;
            }
            
            if (!email || !email.includes('@')) {
                showError('Por favor, digite um e-mail válido');
                return;
            }
            
            if (senha !== confirmar) {
                showError('As senhas não coincidem!');
                return;
            }
            
            if (senha.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres!');
                return;
            }
            
            const userData = {
                nome: nome,
                email: email,
                telefone: document.getElementById('telefone').value,
                cpf: document.getElementById('cpf').value,
                senha: senha,
                dataCadastro: new Date().toISOString()
            };
            
            localStorage.setItem('userLogged', JSON.stringify(userData));
            localStorage.setItem('isLogged', 'true');
            
            showSuccess('✅ Cadastro realizado com sucesso! Redirecionando...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });
        
        function showError(msg) {
            const toast = document.getElementById('toastMsg') || createToast();
            toast.textContent = msg;
            toast.style.background = '#dc2626';
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }
        
        function showSuccess(msg) {
            const toast = document.getElementById('toastMsg') || createToast();
            toast.textContent = msg;
            toast.style.background = '#00c853';
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }
        
        function createToast() {
            const toast = document.createElement('div');
            toast.id = 'toastMsg';
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
            return toast;
        }
    </script>
</body>
</html>
