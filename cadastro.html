<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro - LuxBet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 100px;
            background: linear-gradient(135deg, #0b0e11 0%, #1a1f24 100%);
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .auth-card h2 i {
            color: var(--primary);
            margin-right: 10px;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,200,83,0.2);
        }
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,200,83,0.4);
        }
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            z-index: 100;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Voltar</a>
    
    <div class="auth-container">
        <div class="auth-card">
            <h2><i class="fas fa-user-plus"></i> Criar Conta</h2>
            <p class="auth-subtitle">Comece a ganhar agora mesmo!</p>
            
            <form id="cadastroForm">
                <div class="input-group">
                    <label>Nome completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome">
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label>Telefone</label>
                    <input type="tel" id="telefone" required placeholder="(11) 99999-9999">
                </div>
                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="senha" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="input-group">
                    <label>Confirmar senha</label>
                    <input type="password" id="confirmarSenha" required placeholder="Digite novamente">
                </div>
                <button type="submit" class="btn-submit">CADASTRAR</button>
            </form>
            
            <div class="auth-footer">
                Já tem conta? <a href="login.html">Faça login</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmarSenha').value;
            
            if (senha !== confirmar) {
                alert('As senhas não coincidem!');
                return;
            }
            
            if (senha.length < 6) {
                alert('A senha deve ter no mínimo 6 caracteres!');
                return;
            }
            
            // Salvar dados no localStorage
            const userData = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                cpf: document.getElementById('cpf').value,
                senha: senha
            };
            
            localStorage.setItem('userLogged', JSON.stringify(userData));
            localStorage.setItem('isLogged', 'true');
            
            alert('✅ Cadastro realizado com sucesso!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
