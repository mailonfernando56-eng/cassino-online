<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - LuxBet | Entre e Ganhe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c10;
            --bg-darker: #05070a;
            --bg-card: rgba(18, 22, 28, 0.95);
            --primary: #00c853;
            --primary-dark: #009624;
            --primary-glow: rgba(0, 200, 83, 0.3);
            --secondary: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #8a93a3;
            --text-muted: #5a6373;
            --border: #2a2f3a;
            --border-light: #1f242c;
            --gradient: linear-gradient(135deg, #00c853 0%, #ffd700 100%);
            --gradient-primary: linear-gradient(135deg, #00c853 0%, #69f0ae 100%);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(0, 200, 83, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 200, 83, 0.08), transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            bottom: -50%;
            right: -50%;
            background: radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.05), transparent 70%);
            animation: rotateReverse 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(0, 200, 83, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }

        /* Auth Container */
        .auth-container {
            position: relative;
            z-index: 1;
            padding: 40px 20px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Auth Card */
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 48px 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease;
        }

        .auth-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
            transform: translateY(-5px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Auth Header */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            display: inline-block;
        }

        .logo span {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--secondary);
        }

        .auth-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-header h2 i {
            color: var(--primary);
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-group label i {
            margin-right: 8px;
            color: var(--primary);
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(10, 12, 16, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        /* Password Wrapper */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Forgot Password */
        .forgot-password {
            text-align: right;
            margin-bottom: 28px;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: var(--gradient-primary);
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #000;
            margin-bottom: 24px;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
            gap: 12px;
        }

        /* Auth Footer */
        .auth-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Social Login */
        .social-login {
            margin-top: 24px;
            text-align: center;
        }

        .social-login p {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 16px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--border);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 20px;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .social-icon:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
        }

        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00c853;
            color: #000;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Demo Account */
        .demo-account {
            background: rgba(0, 200, 83, 0.1);
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(0, 200, 83, 0.2);
        }

        .demo-account-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .demo-account-info i {
            color: var(--primary);
            font-size: 18px;
        }

        .demo-account-info span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .demo-account-info strong {
            color: var(--primary);
            font-size: 12px;
        }

        .demo-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .demo-btn:hover {
            background: var(--primary);
            color: #000;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .logo {
                font-size: 28px;
            }

            .auth-header h2 {
                font-size: 24px;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="particles" id="particles"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">LUX<span>BET</span></div>
            <h2><i class="fas fa-sign-in-alt"></i> Bem-vindo de Volta</h2>
            <p>Entre e continue ganhando</p>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="senha" required placeholder="Digite sua senha" autocomplete="current-password">
                    <i class="fas fa-eye-slash toggle-password"></i>
                </div>
            </div>
            <div class="forgot-password">
                <a href="#">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="btn-submit">
                ENTRAR <i class="fas fa-arrow-right"></i>
            </button>
        </form>
        
        <div class="social-login">
            <p>Ou continue com</p>
            <div class="social-icons">
                <div class="social-icon" onclick="socialLogin('google')">
                    <i class="fab fa-google"></i>
                </div>
                <div class="social-icon" onclick="socialLogin('facebook')">
                    <i class="fab fa-facebook-f"></i>
                </div>
                <div class="social-icon" onclick="socialLogin('apple')">
                    <i class="fab fa-apple"></i>
                </div>
            </div>
        </div>
        
        <div class="demo-account">
            <div class="demo-account-info">
                <i class="fas fa-user-circle"></i>
                <span>Conta Demo:</span>
                <strong>demo@luxbet.com</strong>
                <span>| senha: 123456</span>
            </div>
            <button class="demo-btn" onclick="fillDemoAccount()">Usar Demo</button>
        </div>
        
        <div class="auth-footer">
            Não tem conta? <a href="cadastro.html">Cadastre-se grátis</a>
        </div>
    </div>
</div>

<script>
    // Criar partículas
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }
    }

    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', function() {
            const input = this.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.remove('fa-eye-slash');
                this.classList.add('fa-eye');
            } else {
                input.type = 'password';
                this.classList.remove('fa-eye');
                this.classList.add('fa-eye-slash');
            }
        });
    });

    // Show toast message
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.textContent = msg;
        toast.style.background = isError ? '#f44336' : '#00c853';
        toast.style.color = isError ? '#fff' : '#000';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Preencher conta demo
    function fillDemoAccount() {
        document.getElementById('email').value = 'demo@luxbet.com';
        document.getElementById('senha').value = '123456';
        showToast('🔓 Conta demo preenchida! Clique em Entrar para testar.');
    }

    // Social login simulation
    function socialLogin(provider) {
        showToast(`🔐 Login com ${provider} em desenvolvimento`, false);
        setTimeout(() => {
            showToast(`✨ Em breve você poderá entrar com ${provider}!`, false);
        }, 1500);
    }

    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        
        if (!email || !senha) {
            showToast('❌ Preencha todos os campos!', true);
            return;
        }
        
        const userData = localStorage.getItem('userLogged');
        
        if (userData) {
            const user = JSON.parse(userData);
            if (user.email === email && user.senha === senha) {
                localStorage.setItem('isLogged', 'true');
                localStorage.setItem('userName', user.nome);
                showToast('✅ Login realizado com sucesso! Redirecionando...');
                
                // Adicionar efeito no botão
                const btn = document.querySelector('.btn-submit');
                btn.innerHTML = '<span class="loading-spinner"></span> Entrando...';
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showToast('❌ E-mail ou senha incorretos!', true);
                // Shake effect on card
                const card = document.querySelector('.auth-card');
                card.style.animation = 'shake 0.5s ease';
                setTimeout(() => {
                    card.style.animation = '';
                }, 500);
            }
        } else {
            showToast('❌ Nenhuma conta encontrada! Faça seu cadastro primeiro.', true);
            setTimeout(() => {
                if (confirm('Deseja se cadastrar agora?')) {
                    window.location.href = 'cadastro.html';
                }
            }, 1000);
        }
    });

    // Shake animation keyframes
    const style = document.createElement('style');
    style.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    `;
    document.head.appendChild(style);

    // Loading spinner style
    const spinnerStyle = document.createElement('style');
    spinnerStyle.textContent = `
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    `;
    document.head.appendChild(spinnerStyle);

    // Verificar se já está logado
    document.addEventListener('DOMContentLoaded', () => {
        createParticles();
        
        const isLogged = localStorage.getItem('isLogged');
        if (isLogged === 'true') {
            showToast('👋 Você já está logado! Redirecionando...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
        
        // Adicionar efeito de focus nos inputs
        const inputs = document.querySelectorAll('.input-group input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.style.transform = 'scale(1.01)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.style.transform = '';
            });
        });
    });
</script>

</body>
</html>
