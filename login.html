<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - LuxBet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <div class="logo">LUX<span>BET</span></div>
                <h2><i class="fas fa-sign-in-alt"></i> Bem-vindo de Volta</h2>
                <p>Entre e continue ganhando</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="senha" required placeholder="Digite sua senha">
                        <i class="fas fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                <div class="input-group forgot-password">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-submit">ENTRAR</button>
            </form>
            
            <div class="auth-footer">
                Não tem conta? <a href="cadastro.html">Cadastre-se grátis</a>
            </div>
        </div>
    </div>
    
    <script>
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            const userData = localStorage.getItem('userLogged');
            
            if (userData) {
                const user = JSON.parse(userData);
                if (user.email === email && user.senha === senha) {
                    localStorage.setItem('isLogged', 'true');
                    showSuccess('✅ Login realizado com sucesso! Redirecionando...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('❌ E-mail ou senha incorretos!');
                }
            } else {
                showError('❌ Nenhuma conta encontrada! Faça seu cadastro primeiro.');
            }
        });
        
        function showError(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.textContent = msg;
            toast.style.background = '#dc2626';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showSuccess(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.textContent = msg;
            toast.style.background = '#00c853';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
