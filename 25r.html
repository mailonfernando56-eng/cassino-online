<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pagamento R$ 25,00</title>
</head>
<body>
    <div class="payment-box">
        <h3>Finalize seu Depósito</h3>
        <div class="value-tag">R$ 25,00</div>
        
        <div class="qr-frame">
            <img src="qr-10.png" alt="QR Code">
        </div>
        
        <p style="font-size: 14px; margin-bottom: 20px;">Escaneie o QR Code acima para confirmar o pagamento via PIX.</p>
        
        <button onclick="alert('Código PIX Copiado!')" class="btn-deposit" style="width: 100%; background: #2d3748; color: white;">COPIAR CHAVE PIX</button>
        
        <a href="deposito.html" style="color: var(--text-dim); text-decoration: none; display: block; margin-top: 20px;">Alterar Valor</a>
    </div>
</body>
</html>
