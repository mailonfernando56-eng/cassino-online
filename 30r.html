<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito R$30 - LuxBet</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0b0e11 0%, #1a1f24 100%);
        }
        .payment-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        img {
            width: 250px;
            height: 250px;
            margin: 20px 0;
        }
        .btn-home {
            background: var(--primary);
            color: #000;
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }
        h2 {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="payment-box">
        <h2>🏆 Depósito R$30</h2>
        <img src="qr-30.png" alt="QR Code R$30">
        <p>Escaneie o QR Code para pagar via PIX</p>
        <button class="btn-home" onclick="window.location.href='index.html'">Voltar ao Início</button>
    </div>
</body>
</html>
